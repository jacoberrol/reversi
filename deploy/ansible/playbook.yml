---
# Deploy the netplay relay server to the exe.dev VM.
#
# Invoked by .github/workflows/deploy.yml. CI builds a static
# x86_64-unknown-linux-musl binary (so the VM needs no toolchain) and passes
# its path as `netplay_binary_src`; the NETPLAY_TOKENS secret is read from the
# runner's environment while rendering the env file. TLS is terminated by the
# exe.dev proxy, which forwards wss://relay.netplay.oliverj.network to
# 127.0.0.1:8000 on this host.
- name: Deploy netplay relay server
  hosts: netplay
  become: true
  vars:
    netplay_user: netplay
    netplay_port: 8000
    netplay_bin: /usr/local/bin/netplay-server
    netplay_config_dir: /etc/netplay
    netplay_env_file: /etc/netplay/netplay.env
    # netplay_binary_src is supplied by CI via --extra-vars.

  tasks:
    - name: Create the netplay system user
      ansible.builtin.user:
        name: "{{ netplay_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create the config directory
      ansible.builtin.file:
        path: "{{ netplay_config_dir }}"
        state: directory
        owner: root
        group: "{{ netplay_user }}"
        mode: "0750"

    - name: Install the token environment file
      ansible.builtin.template:
        src: netplay.env.j2
        dest: "{{ netplay_env_file }}"
        owner: root
        group: "{{ netplay_user }}"
        mode: "0640"
      no_log: true # never echo the token to the CI log
      notify: Restart netplay

    - name: Install the server binary
      ansible.builtin.copy:
        src: "{{ netplay_binary_src }}"
        dest: "{{ netplay_bin }}"
        owner: root
        group: root
        mode: "0755"
      notify: Restart netplay

    - name: Install the systemd unit
      ansible.builtin.template:
        src: netplay-server.service.j2
        dest: /etc/systemd/system/netplay-server.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart netplay

    - name: Enable netplay-server (start it if not already running)
      ansible.builtin.systemd:
        name: netplay-server
        enabled: true
        state: started
        daemon_reload: true

    # Apply any binary/config/unit change now, before the health check runs.
    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Wait for the relay to accept connections
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ netplay_port }}"
        timeout: 15

  handlers:
    - name: Restart netplay
      ansible.builtin.systemd:
        name: netplay-server
        state: restarted
        daemon_reload: true
