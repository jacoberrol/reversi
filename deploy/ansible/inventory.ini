# Single-host inventory for the netplay relay VM (exe.dev).
#
# The host key and connection user are not secret, so they live here; CI
# supplies the SSH *private key* at runtime via --private-key. `exedev` has
# passwordless sudo, so `become: true` in the playbook needs no password.
[netplay]
netplay.exe.xyz

[netplay:vars]
ansible_user=exedev
ansible_python_interpreter=/usr/bin/python3
